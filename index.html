                const root = document.documentElement;

                    root.style.setProperty('--primary-purple', colors.primary);
                    // Set a slightly darker variant for gradients (mix with purple)
                    root.style.setProperty('--primary-purple-dark', colors.primary);
                }
                if (colors.text_white) root.style.setProperty('--text-white', colors.text_white);
                if (colors.text_regular) root.style.setProperty('--text-regular', colors.text_regular);
                if (colors.shadow) root.style.setProperty('--shadow-color', colors.shadow);
                if (colors.nav) root.style.setProperty('--nav-color', colors.nav);
                if (colors.glow) root.style.setProperty('--glow-color', colors.glow);

            };

                if (!ann) return;
                document.documentElement.style.setProperty('--announcement-bg', ann.bg_color || '#cc73f8');
                document.documentElement.style.setProperty('--announcement-text', ann.text_color || '#ffffff');
                if (ann.enabled) document.body.classList.add('has-announcement');
                else document.body.classList.remove('has-announcement');
            };

            const uploadImg = async (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) { alert("Please select an image file only!"); return; }
                const fd = new FormData();
                fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
                try {
                    const res = await fetch(CLOUDINARY_URL, { method: "POST", body: fd });
                    const json = await res.json();
                    if (json.secure_url) { callback(json.secure_url); alert("Image Uploaded Successfully!"); }
                    else throw new Error("Upload failed");
                } catch(err) { alert("Upload Failed!"); console.error(err); }
            };

            const toggleCart = (svc) => {
                // If item has a _dealKey, match by that; otherwise match by name
                if (svc._dealKey) {
                    const exists = cart.find(c => c._dealKey === svc._dealKey);
                    setCart(exists ? cart.filter(c => c._dealKey !== svc._dealKey) : [...cart, {...svc, qty:1}]);
                } else {
                    const exists = cart.find(c => c.name === svc.name && !c._dealKey);
                    setCart(exists ? cart.filter(c => !(c.name === svc.name && !c._dealKey)) : [...cart, {...svc, qty:1}]);
                }
            };

            const toggleMenuItem = (name, price) => {
                const exists = cart.find(c => c.name === name && !c._dealKey);
                if (exists) {
                    setCart(prev => prev.map(c => c.name===name&&!c._dealKey ? {...c,qty:(c.qty||1)+1} : c));
                } else {
                    setCart(prev => [...prev, {name, price, desc:"Menu item", img:"", qty:1}]);
                }

                setCart(prev => prev.map(c => {
                    const match = dealKey ? c._dealKey === dealKey : (c.name === name && !c._dealKey);
                    if (!match) return c;
                    const newQty = (c.qty||1) + delta;
                    return newQty < 1 ? null : {...c, qty: newQty};
                }).filter(Boolean));

                                        <span className="text-xs uppercase tracking-widest font-bold mr-2" style={{color:data.colors.primary}}>Follow:</span>
                                        {data.footer.social_links.map((link,idx)=>(
                                            <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="social-icon" style={{borderColor:data.colors.primary,background:'transparent'}} title={link.name}>
                                                {link.icon_url
                                                    ? <div style={{position:'relative',width:'20px',height:'20px',background:data.colors.primary,borderRadius:'4px',WebkitMaskImage:`url(${link.icon_url})`,WebkitMaskSize:'contain',WebkitMaskRepeat:'no-repeat',WebkitMaskPosition:'center',maskImage:`url(${link.icon_url})`,maskSize:'contain',maskRepeat:'no-repeat',maskPosition:'center'}}/>
                                                    : <span style={{color:data.colors.primary,fontSize:'14px'}}>?</span>
                                                }
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </footer>

                            {/* AI Chat Widget */}
                            
                        </div>
                    )}

                    {/* ===== DEAL DETAIL MODAL ===== */}
                    {dealModal && (()=>{
                        const {sec, deal} = dealModal;
                        const flavors = deal.flavors || [];
                        const selectCount = deal.flavorSelectCount || 1;
                        const discPct = deal.originalPrice > deal.discountedPrice ? Math.round(100-(deal.discountedPrice/deal.originalPrice)*100) : 0;
                        const toggleFlavor = (f) => {
                            setSelectedFlavors(prev => {
                                const exists = prev.includes(f);
                                if (exists) return prev.filter(x=>x!==f);
                                if (prev.length >= selectCount) return [...prev.slice(1), f];
                                return [...prev, f];
                            });
                        };
                        const handleAddToCart = () => {
                            toggleDealCart(sec, deal);
                            setDealModal(null);
                            setSelectedFlavors([]);
                        };
                        return (
                            <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}
                                onClick={e=>{if(e.target===e.currentTarget){setDealModal(null);setSelectedFlavors([]);}}}>
                                <div style={{background:'#111',borderRadius:'16px',width:'100%',maxWidth:'520px',maxHeight:'90vh',overflowY:'auto',position:'relative',border:`1px solid ${data.colors.primary}30`}}>
                                    {/* Close */}
                                    <button onClick={()=>{setDealModal(null);setSelectedFlavors([]);}} style={{position:'absolute',top:'12px',right:'12px',background:'rgba(0,0,0,0.5)',border:'none',color:'white',width:'32px',height:'32px',borderRadius:'50%',cursor:'pointer',fontSize:'16px',zIndex:2}}>✕</button>

                                    {/* Image */}
                                    {deal.image && (
                                        <div style={{width:'100%',height:'240px',position:'relative',borderRadius:'16px 16px 0 0',overflow:'hidden'}}>
                                            <img src={deal.image} alt={deal.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                                            {discPct > 0 && <div style={{position:'absolute',top:'12px',left:'12px',background:data.colors.primary,color:'#fff',fontWeight:'800',fontSize:'12px',padding:'4px 10px',borderRadius:'6px'}}>{discPct}% OFF</div>}
                                        </div>
                                    )}

                                    <div style={{padding:'20px'}}>
                                        {/* Name & Price */}
                                        <h2 style={{fontSize:'22px',fontWeight:'800',color:'white',marginBottom:'6px'}}>{deal.name}</h2>
                                        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
                                            {deal.originalPrice > deal.discountedPrice && <span style={{fontSize:'14px',color:'rgba(255,255,255,0.4)',textDecoration:'line-through'}}>Rs. {Number(deal.originalPrice).toLocaleString()}</span>}
                                            <span style={{fontSize:'20px',fontWeight:'800',color:data.colors.primary}}>Rs. {Number(deal.discountedPrice).toLocaleString()}</span>
                                        </div>
                                        {deal.subtitle && <p style={{fontSize:'13px',color:'rgba(255,255,255,0.5)',marginBottom:'16px'}}>{deal.subtitle}</p>}

                                        {/* Flavor Selection */}
                                        {flavors.length > 0 && (
                                            <div style={{marginBottom:'20px'}}>
                                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
                                                    <p style={{fontSize:'14px',fontWeight:'700',color:'white'}}>Select your Flavor</p>
                                                    <span style={{background:data.colors.primary,color:'#fff',fontSize:'10px',fontWeight:'800',padding:'2px 8px',borderRadius:'4px'}}>Select {selectCount}</span>
                                                </div>
                                                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                                                    {flavors.map((f,i)=>{
                                                        const sel = selectedFlavors.includes(f.name||f);
                                                        return (
                                                            <div key={i} onClick={()=>toggleFlavor(f.name||f)}
                                                                style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',background:sel?`${data.colors.primary}20`:'rgba(255,255,255,0.04)',border:`1px solid ${sel?data.colors.primary:'rgba(255,255,255,0.08)'}`,borderRadius:'10px',cursor:'pointer',transition:'all 0.2s'}}>
                                                                <div>
                                                                    <p style={{fontSize:'14px',fontWeight:'600',color:'white',marginBottom:'2px'}}>{f.name||f}</p>
                                                                    {f.desc && <p style={{fontSize:'11px',color:'rgba(255,255,255,0.4)'}}>{f.desc}</p>}
                                                                </div>
                                                                <div style={{width:'20px',height:'20px',borderRadius:'50%',border:`2px solid ${sel?data.colors.primary:'rgba(255,255,255,0.3)'}`,background:sel?data.colors.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                                                                    {sel && <span style={{color:'#fff',fontSize:'10px',fontWeight:'800'}}>✓</span>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {/* Add to Cart Button */}
                                        <button onClick={handleAddToCart}
                                            style={{width:'100%',padding:'16px',background:`linear-gradient(135deg,${data.colors.primary},#a855f7)`,border:'none',borderRadius:'12px',color:'white',fontSize:'15px',fontWeight:'800',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                                            <span>Rs. {Number(deal.discountedPrice).toLocaleString()}</span>
                                            <span>Add to Cart →</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* ===== DELIVERY MODAL ===== */}
                    {bookingModal && (
                        <div className="booking-overlay" onClick={e=>{ if(e.target===e.currentTarget) setBookingModal(false); }}>
                            <div className="booking-modal" style={{border:`1.5px solid ${data?.colors?.primary||'#cc73f8'}33`, boxShadow:`0 30px 80px rgba(0,0,0,0.6), 0 0 40px ${data?.colors?.primary||'#cc73f8'}20`, padding:'0', overflow:'hidden'}}>

                                {/* Header */}
                                <div style={{display:'flex', alignItems:'center', gap:'12px', padding:'16px 20px', borderBottom:`1px solid ${data?.colors?.primary||'#cc73f8'}30`, background:'rgba(0,0,0,0.4)'}}>
                                    <button onClick={()=>setBookingModal(false)} style={{background:'transparent', border:'none', color:data?.colors?.primary||'#cc73f8', cursor:'pointer', fontSize:'13px', fontWeight:'700', display:'flex', alignItems:'center', gap:'6px', letterSpacing:'0.05em'}}>
                                        ← Back to Cart
                                    </button>
                                    <span style={{flex:1, textAlign:'center', fontSize:'11px', fontWeight:'800', letterSpacing:'0.2em', textTransform:'uppercase', color:data?.colors?.primary||'#cc73f8'}}>Delivery Details</span>
                                    <div style={{width:'80px'}}></div>
                                </div>

                                {/* Scrollable body */}
                                <div style={{overflowY:'auto', maxHeight:'75vh', padding:'20px'}}>
                                    <div className="flex flex-col gap-4">

                                        {/* Full Name */}
                                        <div>
                                            <label className="booking-field-label">Full Name <span style={{color:'#ef4444'}}>*</span></label>
                                            <input className="booking-input" type="text" placeholder="Apna naam likhein"
                                                value={bookingForm.name}
                                                onChange={e=>{ setBookingForm({...bookingForm,name:e.target.value}); setBookingError(''); }}
                                                style={{borderColor: bookingError && !bookingForm.name.trim() ? '#ef4444' : ''}}
                                            />
                                        </div>

                                        {/* Phone */}
                                        <div>
                                            <label className="booking-field-label">Phone Number <span style={{color:'#ef4444'}}>*</span></label>
                                            <input className="booking-input" type="tel" placeholder="03XXXXXXXXX"
                                                value={bookingForm.phone}
                                                onChange={e=>{ setBookingForm({...bookingForm,phone:e.target.value}); setBookingError(''); }}
                                                style={{borderColor: bookingError && !bookingForm.phone.trim() ? '#ef4444' : ''}}
                                            />
                                        </div>

                                        {/* Email */}
                                        <div>
                                            <label className="booking-field-label">Email Address</label>
                                            <input className="booking-input" type="email" placeholder="example@email.com"
                                                value={bookingForm.email}
                                                onChange={e=>setBookingForm({...bookingForm,email:e.target.value})}
                                            />
                                        </div>

                                        {/* City */}
                                        <div>
                                            <label className="booking-field-label">City <span style={{color:'#ef4444'}}>*</span></label>
                                            <select className="booking-input" value={bookingForm.city}
                                                onChange={e=>{ setBookingForm({...bookingForm,city:e.target.value}); setBookingError(''); }}
                                                style={{borderColor: bookingError && !bookingForm.city ? '#ef4444' : '', background:'rgba(0,0,0,0.4)', cursor:'pointer'}}
                                            >
                                                <option value="">-- City select karein --</option>
                                                {(data.delivery_cities||[]).map((city,i)=>(
                                                    <option key={i} value={city}>{city}</option>
                                                ))}
                                            </select>
                                        </div>

                                        {/* Street / Area */}
                                        <div>
                                            <label className="booking-field-label">Street / Area</label>
                                            <input className="booking-input" type="text" placeholder="e.g. Gulberg III, Street 5"
                                                value={bookingForm.street}
                                                onChange={e=>setBookingForm({...bookingForm,street:e.target.value})}
                                            />
                                        </div>

                                        {/* Full Address */}
                                        <div>
                                            <label className="booking-field-label">Full Address <span style={{color:'#ef4444'}}>*</span></label>
                                            <textarea className="booking-input" rows="3" placeholder="Ghar ka pura address, landmark, etc."
                                                value={bookingForm.address}
                                                onChange={e=>{ setBookingForm({...bookingForm,address:e.target.value}); setBookingError(''); }}
                                                style={{borderColor: bookingError && !bookingForm.address.trim() ? '#ef4444' : '', resize:'none'}}
                                            />
                                        </div>

                                        {/* Order Note */}
                                        <div>
                                            <label className="booking-field-label">Order Note <span style={{color:'rgba(255,255,255,0.3)', fontWeight:400}}>(Optional)</span></label>
                                            <textarea className="booking-input" rows="2" placeholder="Koi khaas instructions..."
                                                value={bookingForm.note}
                                                onChange={e=>setBookingForm({...bookingForm,note:e.target.value})}
                                                style={{resize:'none'}}
                                            />
                                        </div>

                                        {/* Order Summary */}
                                        <div style={{background:'rgba(0,0,0,0.35)', border:`1px solid ${data?.colors?.primary||'#cc73f8'}30`, borderRadius:'12px', padding:'16px', marginTop:'4px'}}>
                                            <p style={{fontSize:'10px', fontWeight:'800', letterSpacing:'0.2em', textTransform:'uppercase', color:data?.colors?.primary||'#cc73f8', marginBottom:'12px'}}>Order Summary</p>
                                            {cart.map((item,i)=>{
                                                return (
                                                    <div key={i} style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'8px'}}>
                                                        <span style={{fontSize:'13px', color:'rgba(255,255,255,0.7)'}}>{item.name}{(item.qty||1)>1 ? <span style={{color:data?.colors?.primary||'#cc73f8', fontWeight:'700'}}> x{item.qty}</span> : ''}</span>
                                                        <span style={{fontSize:'13px', fontWeight:'700', color:'rgba(255,255,255,0.9)', marginLeft:'12px', whiteSpace:'nowrap'}}>{item.price}</span>
                                                    </div>
                                                );
                                            })}
                                            <div style={{borderTop:`1px solid ${data?.colors?.primary||'#cc73f8'}30`, marginTop:'10px', paddingTop:'10px', display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                                                <span style={{fontSize:'12px', fontWeight:'800', letterSpacing:'0.1em', textTransform:'uppercase', color:'white'}}>Total</span>
                                                <span style={{fontSize:'16px', fontWeight:'800', color:data?.colors?.primary||'#cc73f8'}}>
                                                    {(()=>{
                                                        const total = cart.reduce((s,c)=>{
                                                            const n = parseFloat((c.price||'').toString().replace(/[^0-9.]/g,''))||0;
                                                            return s + n*(c.qty||1);
                                                        },0);
                                                        const cur = (cart[0]?.price||'').includes('Rs')?'Rs.':'$';
                                                        return `${cur} ${total.toLocaleString()}`;
                                                    })()}
                                                </span>
                                            </div>
                                        </div>

                                        {/* Error */}
                                        {bookingError && <div className="booking-error">{bookingError}</div>}

                                        {/* Send Button */}
                                        <button
                                            className="btn-premium w-full py-4 text-sm font-bold uppercase tracking-widest"
                                            style={{background:`linear-gradient(135deg, ${data?.colors?.primary||'#cc73f8'} 0%, #a855f7 100%)`, boxShadow:`0 8px 30px ${data?.colors?.primary||'#cc73f8'}50`}}
                                            onClick={sendWhatsApp}
                                        >
                                            📲 Place Order via WhatsApp
                                        </button>
                                        <p className="text-center text-[10px] text-white/25 mt-2 uppercase tracking-widest">You'll be redirected to WhatsApp</p>

                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- GTM Body Script placeholder (inject after body tag) -->
    <div id="gtm-body-scripts"></div>

    <!-- Scroll Reveal -->
    <script>
    (function(){
        function initReveal(){
            var els = document.querySelectorAll('.reveal');
            if(!els.length){ setTimeout(initReveal, 300); return; }
            var io = new IntersectionObserver(function(entries){
                entries.forEach(function(e){
                    if(e.isIntersecting){
                        e.target.classList.add('visible');
                        io.unobserve(e.target);
                    }
                });
            }, { threshold: 0.12 });
            els.forEach(function(el){ io.observe(el); });
        }
        // Re-run on category switch (React re-renders)
        var lastCount = 0;
        setInterval(function(){
            var els = document.querySelectorAll('.reveal:not(.visible)');
            if(els.length !== lastCount){
                lastCount = els.length;
                var io = new IntersectionObserver(function(entries){
                    entries.forEach(function(e){
                        if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }
                    });
                }, { threshold: 0.1 });
                els.forEach(function(el){ io.observe(el); });
            }
        }, 400);
        if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', initReveal); }
        else { setTimeout(initReveal, 500); }
    })();
    </script>
</html>
